name: keep-alive

# Mantiene despierto el backend en Render (plan free duerme a los ~15 min).
# Hace ping a /health cada 10 minutos.
#
# ESTADO: DORMIDO. Solo corre a mano (workflow_dispatch). Para ACTIVARLO,
# descomenta las 2 líneas del bloque `schedule`. OJO: en repo PRIVADO consume
# ~4300 min/mes (gratis solo 2000) → hazlo público primero, o usa un pinger
# externo (cron-job.org) que no gasta minutos de GitHub.

on:
  # schedule:
  #   - cron: "*/10 * * * *"   # cada 10 minutos  ← descomenta para activar
  workflow_dispatch:          # permite ejecutarlo a mano

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          echo "Pinging backend…"
          curl -sf --max-time 60 https://reforma-backend-cgu8.onrender.com/health \
            && echo "OK, backend despierto" \
            || echo "Sin respuesta (puede estar despertando)"
